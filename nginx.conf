server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Subdirectory rules for your Ionic/Vite application
    location /coxevac/ {
        alias /usr/share/nginx/html/coxevac/;
        try_files $uri $uri/ /coxevac/index.html;

        # Inject relaxed CSP rules directly into Nginx response headers
        add_header Content-Security-Policy "default-src 'self' https://dev-b.net; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' *;" always;
    }

    # Root fallback in case anyone hits the main domain without /coxevac/
    location / {
        try_files $uri $uri/ /index.html;
    }
}

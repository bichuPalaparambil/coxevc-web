server {
    listen 80;
    server_name localhost;

    # Notice the root points directly inside the coxevac folder now
    root /usr/share/nginx/html/coxevac;
    index index.html;

    # 1. Catch assets requested relatively or absolutely from root
    location ~ ^/(assets|fonts|images|manifest\.json|favicon\.ico) {
        try_files $uri =404;
    }

    # 2. Catch the /coxevac/ path and transparently route it to index.html
    location /coxevac/ {
        # Strips out /coxevac/ internally and rewrites the request path to root
        rewrite ^/coxevac/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;

        # Inject relaxed CSP rules directly into Nginx response headers
        add_header Content-Security-Policy "default-src 'self' *; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';" always;
    }

    # 3. Handle default fallback routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}

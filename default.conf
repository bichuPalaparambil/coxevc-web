server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location /coxevac/ {
        alias /usr/share/nginx/html/coxevac/;
        try_files $uri $uri/ /coxevac/index.html;

        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: http:; media-src 'self' data: blob: https: http:; font-src 'self' data: https:; connect-src 'self' https: http: wss: ws:; frame-src 'self' https: http: blob:; worker-src 'self' blob:; object-src 'none';" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
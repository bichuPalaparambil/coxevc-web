version: '3.8'
services:
  webserver:
    image: 'nginx:alpine'
    ports:
      - '3013:80'
    volumes:
      # Mounts your custom Nginx configurations
      - './nginx.conf:/etc/nginx/conf.d/default.conf:ro'
      # Mounts your compiled Ionic static files
      - 'static-files:/usr/share/nginx/html'
    environment:
      - SERVICE_FQDN_WEBSERVER
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  static-files:

version: '3.8'
services:
  webserver:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3018:80'
    environment:
      - SERVICE_FQDN_WEBSERVER
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0"]
      interval: 10s
      timeout: 5s
      retries: 3
